<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal Pulse | Luxury Romantic Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #630d0d;
            --accent: #d4af37;
            --bg: #fffcf9;
            --text: #2d2d2d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid #f0e6dc;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        p.subtitle {
            font-style: italic;
            color: #888;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--accent); outline: none; }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background: #4a0909;
            transform: translateY(-2px);
        }

        /* Result View */
        #display-section { display: none; }
        
        .romantic-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            line-height: 1.8;
            margin: 30px 0;
            white-space: pre-wrap;
        }

        .share-box {
            background: #fdf5f5;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            word-break: break-all;
            border: 1px dashed var(--accent);
            margin-top: 20px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-section">
        <h1>Eternal Pulse</h1>
        <p class="subtitle">Craft a masterpiece of affection.</p>
        
        <div class="input-group">
            <label>Recipient's Name</label>
            <input type="text" id="name" placeholder="Who holds your heart?">
        </div>

        <div class="input-group">
            <label>The Sentiment</label>
            <textarea id="message" rows="4" placeholder="Write from the soul..."></textarea>
        </div>

        <button onclick="generateLink()">Create Experience</button>
        
        <div id="link-output" class="hidden">
            <p style="margin-top:20px; font-weight:bold;">Share this private link:</p>
            <div class="share-box" id="final-link"></div>
        </div>
    </div>

    <div id="display-section">
        <h2 id="view-name" style="font-family: 'Playfair Display'; color: var(--accent);"></h2>
        <div class="romantic-text" id="view-message"></div>
        <div style="color: var(--primary); font-size: 2rem;">&hearts;</div>
    </div>
</div>

<script>
    // Logic to handle URL parameters
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('to') && urlParams.has('msg')) {
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('display-section').style.display = 'block';
            
            document.getElementById('view-name').innerText = "For " + decodeURIComponent(urlParams.get('to'));
            document.getElementById('view-message').innerText = decodeURIComponent(urlParams.get('msg'));
        }
    }

    function generateLink() {
        const name = encodeURIComponent(document.getElementById('name').value);
        const msg = encodeURIComponent(document.getElementById('message').value);
        
        if(!name || !msg) { alert("Please fill both fields."); return; }

        const baseUrl = window.location.href.split('?')[0];
        const fullUrl = `${baseUrl}?to=${name}&msg=${msg}`;
        
        document.getElementById('final-link').innerText = fullUrl;
        document.getElementById('link-output').classList.remove('hidden');
    }
</script>

</body>
</html>
